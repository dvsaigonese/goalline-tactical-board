<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal-Line Tactical Board</title>
    <link rel="icon" href="assets/img/GL_logo.jpg" type="image/icon type" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="startup-modal" class="startup-overlay">
      <div class="startup-box">
        <div id="continue-section" style="display:none; margin-bottom: 15px;">
          <button id="btn-continue" class="startup-btn success" style="width:100%; background-color: #10b981;">
            <i class="fa-solid fa-play"></i>
            <span>Continue Previous Session</span>
            <small>Restore your last work</small>
          </button>
          <div style="color: #666; margin: 10px 0;">— OR —</div>
        </div>
        <h2>Welcome to Goal-Line Board</h2>
        <p>Choose your workspace mode:</p>
        
        <div class="startup-options">
          <button id="btn-template-mode" class="startup-btn primary">
            <i class="fa-solid fa-layer-group"></i>
            <span>Standard Pitch</span>
            <small>Use built-in templates</small>
          </button>

          <button id="btn-custom-mode" class="startup-btn accent">
            <i class="fa-solid fa-upload"></i>
            <span>Custom Image</span>
            <small>Upload your own tactical board</small>
          </button>
          
          <input type="file" id="custom-img-input" accept="image/*" hidden>
        </div>
      </div>
    </div>

    <div class="app-container">
      
      <nav class="toolbar">
        <div class="logo">
          <img src="assets/img/GL_logo.jpg" alt="Logo">
        </div>
        
        <div class="tool-group">
          <input type="checkbox" id="draw-arrow-input" class="tool-checkbox" hidden>
          <label for="draw-arrow-input" class="tool-btn" title="Draw Arrow">
            <i class="fa-solid fa-arrow-right-long"></i>
          </label>

          <input type="checkbox" id="draw-polygon-input" class="tool-checkbox" hidden>
          <label for="draw-polygon-input" class="tool-btn" title="Draw Zone">
            <i class="fa-solid fa-draw-polygon"></i>
          </label>

          <button id="closePolygon" class="tool-btn small-btn" title="Finish Zone">
            <i class="fa-solid fa-check"></i>
          </button>
        </div>

        <div class="spacer"></div>

        <div class="tool-group bottom">
          <button id="home-btn" class="tool-btn" title="Back to Home">
             <i class="fa-solid fa-house"></i>
          </button>
          <button id="reset-btn" class="tool-btn warning" title="Reset All">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <button id="delete-btn" class="tool-btn danger" title="Delete Selected">
            <i class="fa-regular fa-trash-can"></i>
          </button>
          <button id="export-btn" class="tool-btn primary" title="Export Image">
            <i class="fa-solid fa-download"></i>
          </button>
        </div>
      </nav>

      <main class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="zoom-controls">
          <span class="copyright">© Goal-Line</span>
        </div>
      </main>

      <aside class="settings-panel">
        <h3>Properties</h3>

        <div class="setting-group">
          <label>Object Size (Scale)</label>
          <div class="row-input">
              <input type="range" id="global-scale" class="form-control" 
                     min="0.1" max="5.0" step="0.1" value="1.0" 
                     style="flex: 2;"> <input type="number" id="scale-number" class="form-control" 
                     min="0.1" max="5.0" step="0.1" value="1.0" 
                     style="flex: 1; text-align: center; padding: 4px;"> </div>
        </div>
        <hr>
        
        <div class="setting-group">
          <label>Pitch Type</label>
          <select id="pitch-type" class="form-control">
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
            <option value="half">Half Pitch</option>
          </select>
        </div>

        <hr>

        <div class="setting-group">
          <label>Add Player / Ball (<span class="circle-count">0</span>)</label>
          <div class="row-input">
            <select id="circle-color" class="form-control color-select">
              <option value="ball">⚽ Ball</option>
              <option value="red" style="color:red">🔴 Red</option>
              <option value="dodgerblue" style="color:blue">🔵 Blue</option>
              <option value="lightgreen" style="color:green">🟢 Green</option>
              <option value="yellow" style="color:gold">🟡 Yellow</option>
              <option value="white">⚪ White</option>
              <option value="black">⚫ Black</option>
            </select>
            <button id="circle-btn" class="add-btn"><i class="fa-solid fa-plus"></i></button>
          </div>
          <input id="circle-text" class="form-control mt-2" placeholder="Number (e.g. 10)">
          <input id="circle-details-text" class="form-control mt-2" placeholder="Name (e.g. Messi)">
          <div class="row-input mt-2">
             <label class="small-label">Text Color:</label>
             <select id="circle-text-color" class="form-control">
              <option value="white">White</option>
              <option value="black">Black</option>
             </select>
          </div>
        </div>

        <hr>

        <div class="setting-group">
          <label>Arrow Settings (<span class="arrow-count">0</span>)</label>
          <div class="row-input">
            <select id="arrow-color" class="form-control">
              <option value="white">White</option>
              <option value="red">Red</option>
              <option value="yellow">Yellow</option>
            </select>
            <select id="arrow-type" class="form-control">
              <option value="solid">Solid</option>
              <option value="dash">Dashed</option>
            </select>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="is-arrow" checked>
            <label for="is-arrow">Has Arrowhead?</label>
          </div>
        </div>

        <hr>

        <div class="setting-group">
          <label>Add Text (<span class="text-count">0</span>)</label>
          <div class="row-input">
            <input id="text-input" class="form-control" placeholder="Enter text...">
            <button id="text-btn" class="add-btn"><i class="fa-solid fa-plus"></i></button>
          </div>
          <div class="row-input mt-2">
            <label class="small-label">Size:</label>
            <select id="text-font-size" class="form-control">
              <option value="16">Small</option>
              <option value="20" selected>Medium</option>
              <option value="32">Large</option>
              <option value="48">Huge</option>
            </select>
          </div>
          <small class="tip">Tip: Hold Shift + Scroll to rotate text</small>
        </div>

        <div style="display:none">
           <span class="polygon-count">0</span>
        </div>
      </aside>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
