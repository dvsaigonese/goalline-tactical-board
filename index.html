<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal-Line Tools Suite</title>
    <link rel="icon" href="assets/img/GL_logo.jpg" type="image/icon type" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
    <div class="landing-wrapper">
        <div class="landing-header">
            <img src="assets/img/GL_logo.jpg" alt="Goal-Line Logo" class="landing-logo">
            <h1>Goal-Line Studio</h1>
            <p>Select a tool to start your workflow</p>
        </div>

        <div class="tool-cards-container">
            <a href="board.html" class="tool-card">
                <div class="card-icon" style="color: var(--primary);">
                    <i class="fa-solid fa-chess-board"></i>
                </div>
                <h3>Tactical Board</h3>
                <p>Design tactics, draw zones, and plan your strategy with our advanced pitch tool.</p>
                <div class="card-btn">Launch Tool <i class="fa-solid fa-arrow-right"></i></div>
            </a>

            <a href="watermark.html" class="tool-card">
                <div class="card-icon" style="color: var(--accent);">
                    <i class="fa-solid fa-stamp"></i>
                </div>
                <h3>Watermark & Title</h3>
                <p>Quickly attach the Goal-Line logo and article titles to your match images.</p>
                <div class="card-btn">Launch Tool <i class="fa-solid fa-arrow-right"></i></div>
            </a>
        </div>
        
        <div class="landing-footer">
            © Goal-Line Team
        </div>
    </div>
</body>
</html>
